data_sources:
  - dataset_name: rsna
    data_zip: processed_datasets/rsna/grayscale.zip
    row_key: processed_path_stem
  - dataset_name: spr
    data_zip: processed_datasets/spr/grayscale.zip
  - dataset_name: vindr
    data_zip: processed_datasets/vindr/grayscale.zip

labels_csv: combined_mammo_recall_labels_birads_only.csv
metadata_member: metadata.csv
label_key: image_id
row_key: image_id
label_col: target
patient_col: patient_id
dataset_col: dataset
labels_dataset_col: dataset
max_samples:
require_all_labels: false

run_dir: runs/all_grayscale_simple_cnn
model: simple_cnn
input_channels: 1
image_size: 512

epochs: 3
batch_size: 8
lr: 0.001
weight_decay: 0.0001
val_fraction: 0.2
num_workers: 4
seed: 42
device: auto
pretrained: false

wandb: true
wandb_project: mammorecall
wandb_entity:
wandb_run_name: all-grayscale-simple-cnn
